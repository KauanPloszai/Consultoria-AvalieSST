<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AvaliESST | Relatórios</title>
    <link rel="stylesheet" href="dashboard.css?v=20260423report2" />
    <link rel="stylesheet" href="report.css?v=20260423visual1" />
  </head>
  <body class="dashboard-body">
    <header class="app-header">
      <div class="app-header__brand">
        <img class="app-header__logo" src="img/logo.png" alt="AvalieSST" />
      </div>

      <div class="app-header__title">
        <span>Relatórios &gt;</span>
        <h1>Relatório de Diagnósticos</h1>
      </div>

      <div class="app-header__actions">
        <button class="header-action header-action--light header-action--excel" type="button" data-report-export-excel>
          <svg viewBox="0 0 24 24" role="presentation">
            <path d="M8 4.5h6l3 3V18a1.5 1.5 0 0 1-1.5 1.5h-7A1.5 1.5 0 0 1 7 18V6A1.5 1.5 0 0 1 8.5 4.5Z" fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="1.8" />
            <path d="M14 4.5V8h3" fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="1.8" />
            <path d="m9.5 15.5 3-4m0 4-3-4m4.5 0h1.5" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="1.8" />
          </svg>
          Exportar Excel
        </button>
        <button class="header-action" type="button" data-report-export-pdf>
          <svg viewBox="0 0 24 24" role="presentation">
            <path d="M8 4.5h6l3 3V18a1.5 1.5 0 0 1-1.5 1.5h-7A1.5 1.5 0 0 1 7 18V6A1.5 1.5 0 0 1 8.5 4.5Z" fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="1.8" />
            <path d="M14 4.5V8h3" fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="1.8" />
            <path d="M9 13h6M9 16h4" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="1.8" />
          </svg>
          Gerar PDF Final
        </button>
      </div>
    </header>

    <div class="header-divider"></div>

    <main class="dashboard-shell">
      <aside class="sidebar">
        <nav class="sidebar__nav" aria-label="Menu principal">
          <a class="sidebar-link" href="dashboard.html">
            <span class="sidebar-link__icon">
              <svg viewBox="0 0 24 24" role="presentation">
                <circle cx="12" cy="8" r="3.2" fill="none" stroke="currentColor" stroke-width="1.8" />
                <path d="M5.8 18a6.2 6.2 0 0 1 12.4 0" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="1.8" />
              </svg>
            </span>
            <span>Admin</span>
          </a>

          <a class="sidebar-link" href="setores-funcao.html">
            <span class="sidebar-link__icon">
              <svg viewBox="0 0 24 24" role="presentation">
                <circle cx="8" cy="9" r="2.4" fill="none" stroke="currentColor" stroke-width="1.6" />
                <circle cx="16" cy="8" r="2" fill="none" stroke="currentColor" stroke-width="1.6" />
                <path d="M4.5 17.5a3.5 3.5 0 0 1 7 0m1-1.3a3 3 0 0 1 5.5 1.3" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="1.6" />
              </svg>
            </span>
            <span>Setores e Função</span>
          </a>

          <a class="sidebar-link" href="formularios.html">
            <span class="sidebar-link__icon">
              <svg viewBox="0 0 24 24" role="presentation">
                <path d="M8 5.5h8M8 9.5h8M8 13.5h5" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="1.7" />
                <rect x="6" y="4" width="12" height="16" rx="2.1" fill="none" stroke="currentColor" stroke-width="1.7" />
              </svg>
            </span>
            <span>Formulários</span>
          </a>

          <a class="sidebar-link sidebar-link--active" href="relatorios.html">
            <span class="sidebar-link__icon">
              <svg viewBox="0 0 24 24" role="presentation">
                <path d="M7 6.5h10M7 10.5h10M7 14.5h6" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="1.7" />
                <path d="M6.5 4h7L18 8.5V18a2 2 0 0 1-2 2h-9a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Z" fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="1.7" />
              </svg>
            </span>
            <span>Relatórios</span>
          </a>
        </nav>

        <div class="sidebar__footer">
          <div class="user-chip">
            <div class="user-chip__avatar">A</div>
            <div class="user-chip__meta">
              <strong>Admin Principal</strong>
              <span data-user-email>admin@avaliiesst.com</span>
            </div>
          </div>
          <button class="logout-button" type="button" data-logout aria-label="Sair">
            <svg viewBox="0 0 24 24" role="presentation">
              <path d="M10 7H7.5A1.5 1.5 0 0 0 6 8.5v7A1.5 1.5 0 0 0 7.5 17H10" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="1.6" />
              <path d="m13 15 3-3-3-3M16 12H9" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6" />
            </svg>
          </button>
        </div>
      </aside>

      <section class="dashboard-main reports-main">
        <div class="reports-layout">
          <aside class="report-config-card">
            <h2 class="report-config-card__title">Configurações do Relatório</h2>

            <div class="report-config-block">
              <label class="report-field">
                <span>Empresa Selecionada</span>
                <select class="report-select" data-report-company></select>
              </label>

              <label class="report-field">
                <span>Formulario Selecionado</span>
                <select class="report-select" data-report-form></select>
              </label>

              <label class="report-field">
                <span>Período de Avaliação</span>
                <select class="report-select" data-report-period>
                  <option value="30">Últimos 30 dias</option>
                  <option value="90">Últimos 90 dias</option>
                  <option value="180" selected>Últimos 6 meses</option>
                  <option value="365">Últimos 12 meses</option>
                  <option value="all">Todo o histórico</option>
                </select>
              </label>
            </div>

            <div class="report-config-block">
              <span class="report-group-label">Filtro de Setores</span>
              <div class="report-checklist" data-report-sector-list></div>
            </div>

            <div class="report-config-block">
              <span class="report-group-label">Seções do Documento</span>
              <div class="report-toggle-list">
                <label class="report-togglerow">
                  <span>Capa e Índice</span>
                  <span class="report-switch"><input type="checkbox" checked data-report-section="cover" /><i></i></span>
                </label>
                <label class="report-togglerow">
                  <span>Resumo Executivo</span>
                  <span class="report-switch"><input type="checkbox" checked data-report-section="summary" /><i></i></span>
                </label>
                <label class="report-togglerow">
                  <span>Análise por Setor</span>
                  <span class="report-switch"><input type="checkbox" checked data-report-section="sectorAnalysis" /><i></i></span>
                </label>
                <label class="report-togglerow">
                  <span>Matriz de Risco</span>
                  <span class="report-switch"><input type="checkbox" checked data-report-section="heatmap" /><i></i></span>
                </label>
                <label class="report-togglerow">
                  <span>Plano de Ação</span>
                  <span class="report-switch"><input type="checkbox" checked data-report-section="actionPlan" /><i></i></span>
                </label>
              </div>
            </div>

            <button class="report-preview-button" type="button" data-report-refresh>
              <svg viewBox="0 0 24 24" role="presentation">
                <path d="M18 10a6 6 0 1 0 1.2 5.2M18 10V5.8m0 4.2h-4.2" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" />
              </svg>
              Atualizar Preview
            </button>

            <p class="stack-feedback" data-report-feedback aria-live="polite"></p>
          </aside>

          <section class="report-preview-area" data-report-preview-area></section>
        </div>
      </section>
    </main>

    <script src="api-client.js?v=20260421u2"></script>
    <script src="dashboard.js?v=20260421ort1"></script>
    <script src="relatorios.js?v=20260423report2"></script>
  </body>
</html>
